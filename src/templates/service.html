<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社交媒体热点词分析平台</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%); font-family: 'Segoe UI', sans-serif; color: #1e293b; }
        .navbar { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white; padding: 1rem 2rem; position: sticky; top: 0; z-index: 100; }
        .navbar-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .logo h1 { font-size: 1.5rem; }
        .logo p { font-size: 0.75rem; opacity: 0.7; }
        .nav-tabs { display: flex; gap: 0.5rem; background: rgba(255,255,255,0.1); border-radius: 2rem; padding: 0.25rem; }
        .tab-btn { padding: 0.5rem 1.5rem; border: none; background: transparent; color: white; border-radius: 2rem; cursor: pointer; }
        .tab-btn.active { background: #3b82f6; }
        .timestamp { font-size: 0.8rem; opacity: 0.7; }
        .container { max-width: 1400px; margin: 2rem auto; padding: 0 1.5rem; }
        .dashboard { display: grid; grid-template-columns: 1fr 0.9fr; gap: 1.5rem; }
        @media (max-width: 900px) { .dashboard { grid-template-columns: 1fr; } }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); overflow: hidden; }
        .card-header { padding: 1rem 1.5rem; border-bottom: 1px solid #eef2ff; font-weight: 600; background: #fafcff; display: flex; justify-content: space-between; }
        .card-header i { color: #3b82f6; margin-right: 0.5rem; }
        .ranking-list { max-height: 550px; overflow-y: auto; }
        .ranking-item { display: flex; align-items: center; padding: 0.8rem 1.2rem; border-bottom: 1px solid #f0f2f8; cursor: pointer; }
        .ranking-item:hover { background: #f8fafc; }
        .ranking-item.selected { background: #eff6ff; border-left: 3px solid #3b82f6; }
        .rank-num { width: 2.5rem; font-weight: 700; color: #94a3b8; }
        .rank-1 { color: #f59e0b; }
        .rank-2 { color: #64748b; }
        .rank-3 { color: #b45309; }
        .rank-content { flex: 1; margin-left: 0.5rem; }
        .rank-title { font-weight: 500; margin-bottom: 0.2rem; }
        .rank-meta { display: flex; gap: 1rem; flex-wrap: wrap; font-size: 0.7rem; color: #6c86a3; }
        .heat-badge { background: #eef2ff; padding: 0.2rem 0.5rem; border-radius: 1rem; }
        .sentiment-badge { padding: 0.2rem 0.5rem; border-radius: 1rem; font-size: 0.7rem; }
        .sentiment-positive { background: #d1fae5; color: #059669; }
        .sentiment-neutral { background: #fef3c7; color: #d97706; }
        .sentiment-negative { background: #fee2e2; color: #dc2626; }
        .wordcloud-container { padding: 1rem; min-height: 320px; display: flex; justify-content: center; align-items: center; }
        .wordcloud-container img { max-width: 100%; border-radius: 0.75rem; cursor: pointer; }
        .sentiment-chart { height: 180px; margin: 0.5rem 1rem; }
        .sentiment-stats { display: flex; gap: 1rem; padding: 1rem; background: #f8fafc; border-radius: 1rem; margin: 0.5rem 1rem; }
        .stat-card { flex: 1; text-align: center; padding: 0.5rem; background: white; border-radius: 0.75rem; }
        .stat-number { font-size: 1.2rem; font-weight: 700; }
        .stat-label { font-size: 0.65rem; color: #64748b; }
        .stat-positive .stat-number { color: #10b981; }
        .stat-neutral .stat-number { color: #f59e0b; }
        .stat-negative .stat-number { color: #ef4444; }
        .detail-panel { padding: 1rem; max-height: 300px; overflow-y: auto; }
        .detail-title { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; }
        .detail-meta { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.5rem; font-size: 0.75rem; color: #64748b; }
        .detail-score { font-size: 1rem; font-weight: 600; margin: 0.5rem 0; }
        .keywords { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 0.5rem 0; }
        .keyword-tag { background: #eef2ff; padding: 0.2rem 0.6rem; border-radius: 1rem; font-size: 0.7rem; color: #3b82f6; }
        .sentiment-words { margin-top: 0.5rem; padding: 0.5rem; background: #f8fafc; border-radius: 0.5rem; font-size: 0.75rem; }
        .loading { text-align: center; padding: 2rem; color: #94a3b8; }
        ::-webkit-scrollbar { width: 5px; }
        .detail-link { color: #3b82f6; text-decoration: none; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-content">
            <div class="logo"><h1><i class="fas fa-chart-line"></i> 热点洞察</h1><p>社交媒体热点词分析平台</p></div>
            <div class="nav-tabs">
                <button class="tab-btn active" data-tab="general">🔥 综合热榜</button>
                <button class="tab-btn" data-tab="tech">💻 科技热榜</button>
            </div>
            <div class="timestamp" id="timestamp">加载中...</div>
        </div>
    </div>

    <div class="container">
        <div class="dashboard">
            <!-- 左侧：排行榜 + 词云 -->
            <div>
                <div class="card">
                    <div class="card-header"><span><i class="fas fa-fire"></i> 热点排行榜</span><span id="ranking-count" class="heat-badge">0条</span></div>
                    <div class="ranking-list" id="ranking-list"><div class="loading">加载中...</div></div>
                </div>
                <div class="card" style="margin-top: 1.5rem;">
                    <div class="card-header"><span><i class="fas fa-cloud"></i> 热点词云</span></div>
                    <div class="wordcloud-container" id="wordcloud-container"><div class="loading">加载词云中...</div></div>
                </div>
            </div>

            <!-- 右侧：情感分析 + 详情（都随点击变化）-->
            <div>
                <div class="card">
                    <div class="card-header"><span><i class="fas fa-chart-pie"></i> 情感分析（当前热词）</span><span id="current-hotword-name" class="heat-badge">未选择</span></div>
                    <div class="sentiment-stats" id="sentiment-stats"><div class="loading">点击热词查看情感分析</div></div>
                    <div id="sentiment-chart" class="sentiment-chart"></div>
                    <div id="sentiment-words" style="margin: 0 1rem 1rem 1rem;"></div>
                </div>
                <div class="card" style="margin-top: 1.5rem;">
                    <div class="card-header"><span><i class="fas fa-info-circle"></i> 热点详情</span></div>
                    <div class="detail-panel" id="detail-panel"><div class="loading">点击左侧热词查看详情</div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'general';
        let sentimentChart = null;

        // 情绪类型映射（基于情感分数）
        function getEmotionType(score, positiveWords, negativeWords) {
            // 优先基于情感词判断
            if (positiveWords.length > 0 && negativeWords.length === 0) {
                return { type: '喜悦/积极', icon: '😊', color: '#10b981', desc: '表达积极、正面的情绪' };
            }
            if (negativeWords.length > 0 && positiveWords.length === 0) {
                return { type: '消极/担忧', icon: '😞', color: '#ef4444', desc: '表达消极、担忧的情绪' };
            }
            if (positiveWords.length > 0 && negativeWords.length > 0) {
                return { type: '矛盾/复杂', icon: '🤔', color: '#f59e0b', desc: '同时包含正面和负面情绪' };
            }
            
            // 基于分数判断
            if (score >= 0.7) {
                return { type: '强烈积极', icon: '😄', color: '#10b981', desc: '情绪非常正面，充满期待或喜悦' };
            } else if (score >= 0.6) {
                return { type: '积极', icon: '🙂', color: '#10b981', desc: '整体情绪偏正面' };
            } else if (score >= 0.45 && score < 0.55) {
                return { type: '中性/客观', icon: '😐', color: '#94a3b8', desc: '情绪中立，客观陈述事实' };
            } else if (score >= 0.3) {
                return { type: '消极', icon: '😕', color: '#ef4444', desc: '整体情绪偏负面' };
            } else {
                return { type: '强烈消极', icon: '😫', color: '#ef4444', desc: '情绪非常负面，表达不满或愤怒' };
            }
        }

        function getSentimentStyle(label) {
            if (label === 'positive') return { label: '正面', class: 'sentiment-positive', icon: '😊' };
            if (label === 'negative') return { label: '负面', class: 'sentiment-negative', icon: '😞' };
            return { label: '中性', class: 'sentiment-neutral', icon: '😐' };
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
        }

        // 更新情感分析面板（基于单个热词）
        function updateSentimentPanel(item) {
            const style = getSentimentStyle(item.sentiment_label);
            const score = item.sentiment_score || 0.5;
            const posWords = item.positive_words || [];
            const negWords = item.negative_words || [];
            const emotion = getEmotionType(score, posWords, negWords);
            
            // 更新标题
            const title = item.title;
            document.getElementById('current-hotword-name').innerText = title.length > 20 ? title.substring(0, 20) + '...' : title;
            
            // 更新统计卡片
            const statsContainer = document.getElementById('sentiment-stats');
            statsContainer.innerHTML = `
                <div class="stat-card stat-positive"><div class="stat-number">${(score * 100).toFixed(0)}%</div><div class="stat-label">正面倾向</div></div>
                <div class="stat-card stat-neutral"><div class="stat-number">${emotion.icon}</div><div class="stat-label">${emotion.type}</div></div>
                <div class="stat-card stat-negative"><div class="stat-number">${((1 - score) * 100).toFixed(0)}%</div><div class="stat-label">负面倾向</div></div>
            `;
            
            // 更新饼图
            if (sentimentChart) sentimentChart.dispose();
            sentimentChart = echarts.init(document.getElementById('sentiment-chart'));
            sentimentChart.setOption({
                tooltip: { trigger: 'item', formatter: '{b}: {d}%' },
                series: [{
                    type: 'pie', radius: '65%', center: ['50%', '50%'],
                    data: [
                        { name: '正面倾向', value: score * 100, itemStyle: { color: '#10b981' } },
                        { name: '负面倾向', value: (1 - score) * 100, itemStyle: { color: '#ef4444' } }
                    ],
                    label: { show: true, formatter: '{b}: {d}%', fontSize: 12 }
                }]
            });
            
            // 更新情绪类型描述
            const wordsContainer = document.getElementById('sentiment-words');
            let emotionHtml = `
                <div style="background: ${emotion.color}10; border-left: 4px solid ${emotion.color}; padding: 0.8rem; border-radius: 0.5rem; margin-bottom: 0.8rem;">
                    <span style="font-size: 1.2rem; font-weight: 600; color: ${emotion.color};">${emotion.icon} ${emotion.type}</span>
                    <span style="margin-left: 0.5rem; font-size: 0.8rem; color: #64748b;">${emotion.desc}</span>
                </div>
            `;
            
            // 添加情感关键词（如果有）
            if (posWords.length > 0 || negWords.length > 0) {
                emotionHtml += `
                    <div style="margin-top: 0.5rem;">
                        <strong>情感关键词：</strong><br>
                        ${posWords.length ? `<span style="color:#10b981;">😊 正面词: ${posWords.map(w => `<span class="keyword-tag" style="background:#d1fae5;">${escapeHtml(w)}</span>`).join('')}</span><br>` : ''}
                        ${negWords.length ? `<span style="color:#ef4444;">😞 负面词: ${negWords.map(w => `<span class="keyword-tag" style="background:#fee2e2;">${escapeHtml(w)}</span>`).join('')}</span>` : ''}
                    </div>
                `;
            } else {
                emotionHtml += `
                    <div style="margin-top: 0.5rem; color: #94a3b8; font-size: 0.75rem;">
                        <i class="fas fa-info-circle"></i> 无显著情感关键词，情绪判断基于整体语义
                    </div>
                `;
            }
            
            wordsContainer.innerHTML = emotionHtml;
        }

        // 加载详情面板
        async function loadDetail(rank) {
            const panel = document.getElementById('detail-panel');
            panel.innerHTML = '<div class="loading">加载中...</div>';
            try {
                const res = await fetch(`/api/hotword_detail/${rank}?type=${currentTab}&t=${Date.now()}`);
                const result = await res.json();
                if (!result.success) throw new Error(result.error);
                const item = result.data;
                const style = getSentimentStyle(item.sentiment_label);
                const score = item.sentiment_score || 0.5;
                const keywords = item.sentiment_keywords || item.words || [];
                const heat = Math.round(item.comprehensive_score || item.rank_score || 0);
                
                panel.innerHTML = `
                    <div class="detail-title">${escapeHtml(item.title)}</div>
                    <div class="detail-meta">
                        <span class="heat-badge">🔥 热度: ${heat}</span>
                        <span class="sentiment-badge ${style.class}">${style.icon} ${style.label}</span>
                        <span>权重: ${item.raw_weight}</span>
                    </div>
                    <div class="detail-score">情感分数: ${score.toFixed(4)} (0-1, 越高越正面)</div>
                    <div>关键词:</div>
                    <div class="keywords">${keywords.slice(0,8).map(k => `<span class="keyword-tag">${escapeHtml(k)}</span>`).join('')}</div>
                    <div style="margin-top:1rem;"><a href="${item.url || '#'}" target="_blank">查看搜索结果</a></div>
                `;
                
                updateSentimentPanel(item);
            } catch (err) {
                panel.innerHTML = `<div class="loading">加载失败: ${err.message}</div>`;
            }
        }

        // 加载排行榜
        async function loadRanking() {
            const endpoint = currentTab === 'general' ? '/api/general_ranking' : '/api/tech_ranking';
            const container = document.getElementById('ranking-list');
            container.innerHTML = '<div class="loading">加载中...</div>';
            try {
                const res = await fetch(`${endpoint}?t=${Date.now()}`);
                const result = await res.json();
                if (!result.success) throw new Error(result.error);
                const data = result.data;
                document.getElementById('ranking-count').innerText = `${data.length}条`;
                document.getElementById('timestamp').innerText = `更新于 ${result.timestamp}`;
                container.innerHTML = data.map((item, idx) => {
                    const style = getSentimentStyle(item.sentiment_label);
                    const heat = Math.round(item.comprehensive_score || item.rank_score || 0);
                    return `
                        <div class="ranking-item" data-rank="${idx+1}">
                            <div class="rank-num ${idx === 0 ? 'rank-1' : idx === 1 ? 'rank-2' : idx === 2 ? 'rank-3' : ''}">#${idx+1}</div>
                            <div class="rank-content">
                                <div class="rank-title">${escapeHtml(item.title)}</div>
                                <div class="rank-meta">
                                    <span class="heat-badge">🔥 ${heat}</span>
                                    <span class="sentiment-badge ${style.class}">${style.icon} ${style.label}</span>
                                    <span>权重: ${item.raw_weight}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
                document.querySelectorAll('.ranking-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const rank = parseInt(el.dataset.rank);
                        document.querySelectorAll('.ranking-item').forEach(e => e.classList.remove('selected'));
                        el.classList.add('selected');
                        loadDetail(rank);
                    });
                });
                if (data.length > 0) {
                    const first = document.querySelector('.ranking-item');
                    if (first) {
                        first.classList.add('selected');
                        loadDetail(1);
                    }
                }
            } catch (err) {
                container.innerHTML = `<div class="loading">加载失败: ${err.message}</div>`;
            }
        }

        // 加载词云
        async function loadWordcloud() {
            const endpoint = currentTab === 'general' ? '/api/general_wordcloud' : '/api/tech_wordcloud';
            const container = document.getElementById('wordcloud-container');
            container.innerHTML = '<div class="loading">加载词云中...</div>';
            try {
                const img = document.createElement('img');
                img.src = `${endpoint}?t=${Date.now()}`;
                img.onclick = () => window.open(img.src, '_blank');
                img.onload = () => { container.innerHTML = ''; container.appendChild(img); };
                img.onerror = () => { container.innerHTML = '<div class="loading">词云加载失败</div>'; };
            } catch (err) {
                container.innerHTML = `<div class="loading">加载失败: ${err.message}</div>`;
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
            document.getElementById('detail-panel').innerHTML = '<div class="loading">点击左侧热词查看详情</div>';
            document.getElementById('sentiment-stats').innerHTML = '<div class="loading">点击热词查看情感分析</div>';
            document.getElementById('sentiment-words').innerHTML = '';
            document.getElementById('current-hotword-name').innerText = '未选择';
            if (sentimentChart) sentimentChart.dispose();
            sentimentChart = null;
            loadRanking();
            loadWordcloud();
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
            switchTab('general');
        });
    </script>
</body>
</html>
