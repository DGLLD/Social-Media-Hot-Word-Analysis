<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>社交媒体热点词分析平台</title>
    <!-- ECharts CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            color: #1e293b;
            min-height: 100vh;
        }

        /* 头部导航 */
        .navbar {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 1rem 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .logo p {
            font-size: 0.75rem;
            opacity: 0.7;
        }

        .nav-tabs {
            display: flex;
            gap: 0.5rem;
            background: rgba(255,255,255,0.1);
            border-radius: 2rem;
            padding: 0.25rem;
        }

        .tab-btn {
            padding: 0.5rem 1.5rem;
            border: none;
            background: transparent;
            color: white;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: #3b82f6;
            color: white;
        }

        .tab-btn:hover:not(.active) {
            background: rgba(255,255,255,0.2);
        }

        .timestamp {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        /* 主容器 */
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        /* 双栏布局 */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 0.9fr;
            gap: 1.5rem;
        }

        /* 卡片样式 */
        .card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.02);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.1);
        }

        .card-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #eef2ff;
            font-weight: 600;
            font-size: 1.1rem;
            background: #fafcff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header i {
            color: #3b82f6;
            margin-right: 0.5rem;
        }

        /* 排行榜列表 */
        .ranking-list {
            max-height: 550px;
            overflow-y: auto;
        }

        .ranking-item {
            display: flex;
            align-items: center;
            padding: 0.8rem 1.2rem;
            border-bottom: 1px solid #f0f2f8;
            cursor: pointer;
            transition: background 0.15s;
        }

        .ranking-item:hover {
            background: #f8fafc;
        }

        .ranking-item.selected {
            background: #eff6ff;
            border-left: 3px solid #3b82f6;
        }

        .rank-num {
            width: 2.5rem;
            font-weight: 700;
            color: #94a3b8;
        }

        .rank-1, .rank-2, .rank-3 {
            font-weight: 800;
        }

        .rank-1 { color: #f59e0b; }
        .rank-2 { color: #64748b; }
        .rank-3 { color: #b45309; }

        .rank-content {
            flex: 1;
            margin-left: 0.5rem;
        }

        .rank-title {
            font-weight: 500;
            margin-bottom: 0.2rem;
        }

        .rank-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.7rem;
            color: #6c86a3;
        }

        .heat-badge {
            background: #eef2ff;
            padding: 0.2rem 0.5rem;
            border-radius: 1rem;
            font-weight: 500;
            font-size: 0.7rem;
        }

        .sentiment-badge {
            padding: 0.2rem 0.5rem;
            border-radius: 1rem;
            font-size: 0.7rem;
        }

        .sentiment-positive { background: #d1fae5; color: #059669; }
        .sentiment-neutral { background: #fef3c7; color: #d97706; }
        .sentiment-negative { background: #fee2e2; color: #dc2626; }

        /* 词云区域 */
        .wordcloud-container {
            padding: 1rem;
            min-height: 320px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fefefe;
        }

        .wordcloud-container img {
            max-width: 100%;
            border-radius: 0.75rem;
        }

        /* 情感分析区域 */
        .sentiment-stats {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            background: #f8fafc;
            border-radius: 1rem;
            margin-bottom: 1rem;
        }

        .stat-card {
            flex: 1;
            text-align: center;
            padding: 0.8rem;
            background: white;
            border-radius: 0.75rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #64748b;
        }

        .stat-positive .stat-number { color: #10b981; }
        .stat-neutral .stat-number { color: #f59e0b; }
        .stat-negative .stat-number { color: #ef4444; }

        .sentiment-chart {
            height: 200px;
            margin-top: 0.5rem;
        }

        /* 详情面板 */
        .detail-panel {
            padding: 1rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .detail-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .detail-meta {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            font-size: 0.8rem;
            color: #64748b;
        }

        .keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0.5rem 0;
        }

        .keyword-tag {
            background: #eef2ff;
            padding: 0.2rem 0.8rem;
            border-radius: 1rem;
            font-size: 0.7rem;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 2rem;
            color: #94a3b8;
        }

        /* 响应式 */
        @media (max-width: 900px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-content">
            <div class="logo">
                <h1><i class="fas fa-chart-line"></i> 热点洞察</h1>
                <p>社交媒体热点词分析平台</p>
            </div>
            <div class="nav-tabs">
                <button class="tab-btn active" data-tab="general">综合热榜</button>
                <button class="tab-btn" data-tab="tech">科技热榜</button>
            </div>
            <div class="timestamp" id="timestamp">加载中...</div>
        </div>
    </div>

    <div class="container">
        <div class="dashboard">
            <!-- 左侧：排行榜 + 词云 -->
            <div>
                <div class="card">
                    <div class="card-header">
                        <span><i class="fas fa-fire"></i> 热点排行榜</span>
                        <span id="ranking-count" class="heat-badge">0条</span>
                    </div>
                    <div class="ranking-list" id="ranking-list">
                        <div class="loading"><i class="fas fa-spinner fa-pulse"></i> 加载中...</div>
                    </div>
                </div>

                <div class="card" style="margin-top: 1.5rem;">
                    <div class="card-header">
                        <span><i class="fas fa-cloud"></i> 热点词云</span>
                        <span id="wordcloud-hint" style="font-size: 0.7rem; color: #6c86a3;">点击词云可放大</span>
                    </div>
                    <div class="wordcloud-container" id="wordcloud-container">
                        <div class="loading"><i class="fas fa-spinner fa-pulse"></i> 加载词云中...</div>
                    </div>
                </div>
            </div>

            <!-- 右侧：情感分析 + 详情 -->
            <div>
                <div class="card">
                    <div class="card-header">
                        <span><i class="fas fa-smile"></i> 情感分析</span>
                        <span id="sentiment-avg" class="heat-badge">平均分: --</span>
                    </div>
                    <div class="sentiment-stats" id="sentiment-stats">
                        <div class="loading">加载中...</div>
                    </div>
                    <div id="sentiment-chart" class="sentiment-chart"></div>
                </div>

                <div class="card" style="margin-top: 1.5rem;">
                    <div class="card-header">
                        <span><i class="fas fa-info-circle"></i> 热点详情</span>
                        <span id="detail-hint" style="font-size: 0.7rem;">点击左侧热词查看详情</span>
                    </div>
                    <div class="detail-panel" id="detail-panel">
                        <div class="loading" style="padding: 2rem;">
                            <i class="fas fa-mouse-pointer"></i> 点击左侧任意热词查看详细分析
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let currentTab = 'general';
        let currentData = [];
        let sentimentChart = null;
        let selectedIndex = -1;

        // API 基础路径
        const API_BASE = '/api';

        // 获取情感标签样式
        function getSentimentLabel(score) {
            if (score >= 0.6) return { label: '正面', class: 'sentiment-positive' };
            if (score <= 0.4) return { label: '负面', class: 'sentiment-negative' };
            return { label: '中性', class: 'sentiment-neutral' };
        }

        // 格式化时间戳
        function formatTimestamp(timestamp) {
            if (!timestamp) return '未知';
            return timestamp;
        }

        // 加载排行榜
        async function loadRanking() {
            const endpoint = currentTab === 'general' ? '/general_ranking' : '/tech_ranking';
            const rankingList = document.getElementById('ranking-list');
            rankingList.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> 加载中...</div>';
            
            try {
                const response = await fetch(`${API_BASE}${endpoint}`);
                const result = await response.json();
                
                if (!result.success) {
                    rankingList.innerHTML = `<div class="loading">加载失败: ${result.error}</div>`;
                    return;
                }
                
                currentData = result.data;
                document.getElementById('ranking-count').innerText = `${currentData.length}条`;
                document.getElementById('timestamp').innerText = `更新于 ${result.timestamp}`;
                
                renderRankingList(currentData);
                
                // 默认选中第一条
                if (currentData.length > 0 && selectedIndex === -1) {
                    selectedIndex = 0;
                    loadHotwordDetail(1);
                    highlightSelected(0);
                }
            } catch (error) {
                rankingList.innerHTML = `<div class="loading">加载失败: ${error.message}</div>`;
            }
        }

        // 渲染排行榜列表
        function renderRankingList(data) {
            const rankingList = document.getElementById('ranking-list');
            
            if (!data || data.length === 0) {
                rankingList.innerHTML = '<div class="loading">暂无数据</div>';
                return;
            }
            
            rankingList.innerHTML = data.map((item, idx) => {
                const rankClass = idx === 0 ? 'rank-1' : (idx === 1 ? 'rank-2' : (idx === 2 ? 'rank-3' : ''));
                const sentiment = getSentimentLabel(item.sentiment_score || 0.5);
                
                return `
                    <div class="ranking-item" data-index="${idx}" data-rank="${idx+1}">
                        <div class="rank-num ${rankClass}">#${idx+1}</div>
                        <div class="rank-content">
                            <div class="rank-title">${escapeHtml(item.title)}</div>
                            <div class="rank-meta">
                                <span class="heat-badge">🔥 ${item.comprehensive_score || item.rank_score || 0}</span>
                                <span class="sentiment-badge ${sentiment.class}">${sentiment.label}</span>
                                <span>权重: ${item.raw_weight}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            // 绑定点击事件
            document.querySelectorAll('.ranking-item').forEach(el => {
                el.addEventListener('click', () => {
                    const idx = parseInt(el.dataset.index);
                    selectedIndex = idx;
                    loadHotwordDetail(idx + 1);
                    highlightSelected(idx);
                });
            });
        }

        // 高亮选中项
        function highlightSelected(idx) {
            document.querySelectorAll('.ranking-item').forEach((el, i) => {
                if (i === idx) {
                    el.classList.add('selected');
                } else {
                    el.classList.remove('selected');
                }
            });
        }

        // 加载热点详情
        async function loadHotwordDetail(rank) {
            const detailPanel = document.getElementById('detail-panel');
            detailPanel.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> 加载详情...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/hotword_detail/${rank}`);
                const result = await response.json();
                
                if (!result.success) {
                    detailPanel.innerHTML = `<div class="loading">加载失败: ${result.error}</div>`;
                    return;
                }
                
                const item = result.data;
                const sentiment = getSentimentLabel(item.sentiment_score || 0.5);
                const keywords = item.sentiment_keywords || item.words || [];
                
                detailPanel.innerHTML = `
                    <div class="detail-title">${escapeHtml(item.title)}</div>
                    <div class="detail-meta">
                        <span class="heat-badge">🔥 热度分: ${item.comprehensive_score || item.rank_score || 0}</span>
                        <span class="sentiment-badge ${sentiment.class}">情感: ${sentiment.label}</span>
                        <span>权重: ${item.raw_weight}</span>
                    </div>
                    <div class="detail-meta">
                        <span><i class="fas fa-calendar"></i> 时间: ${item.timestamp || '未知'}</span>
                        <span><i class="fas fa-hashtag"></i> 词数: ${item.word_count || 0}</span>
                    </div>
                    <div><strong>情感分数:</strong> ${(item.sentiment_score || 0.5).toFixed(4)} (0-1, 越高越正面)</div>
                    <div><strong>关键词:</strong></div>
                    <div class="keywords">
                        ${keywords.slice(0, 8).map(k => `<span class="keyword-tag">${escapeHtml(k)}</span>`).join('')}
                    </div>
                    <div style="margin-top: 0.8rem; font-size: 0.8rem; color: #64748b;">
                        <i class="fas fa-link"></i> <a href="${item.url || '#'}" target="_blank">查看原文</a>
                    </div>
                `;
            } catch (error) {
                detailPanel.innerHTML = `<div class="loading">加载失败: ${error.message}</div>`;
            }
        }

        // 加载词云
        async function loadWordcloud() {
            const endpoint = currentTab === 'general' ? '/general_wordcloud' : '/tech_wordcloud';
            const container = document.getElementById('wordcloud-container');
            container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> 加载词云中...</div>';
            
            try {
                const imgUrl = `${API_BASE}${endpoint}?t=${Date.now()}`;
                const img = document.createElement('img');
                img.src = imgUrl;
                img.style.maxWidth = '100%';
                img.style.borderRadius = '0.75rem';
                img.style.cursor = 'pointer';
                img.onload = () => {
                    container.innerHTML = '';
                    container.appendChild(img);
                };
                img.onerror = () => {
                    container.innerHTML = '<div class="loading">词云图片加载失败</div>';
                };
            } catch (error) {
                container.innerHTML = `<div class="loading">加载失败: ${error.message}</div>`;
            }
        }

        // 加载情感分析
        async function loadSentiment() {
            const endpoint = currentTab === 'general' ? '/general_sentiment' : '/tech_sentiment';
            const statsContainer = document.getElementById('sentiment-stats');
            statsContainer.innerHTML = '<div class="loading">加载中...</div>';
            
            try {
                const response = await fetch(`${API_BASE}${endpoint}`);
                const result = await response.json();
                
                if (!result.success) {
                    statsContainer.innerHTML = `<div class="loading">加载失败: ${result.error}</div>`;
                    return;
                }
                
                const stats = result.statistics;
                document.getElementById('sentiment-avg').innerText = `平均分: ${stats.avg_score}`;
                
                statsContainer.innerHTML = `
                    <div class="stat-card stat-positive">
                        <div class="stat-number">${stats.positive}</div>
                        <div class="stat-label">正面 ${stats.positive_ratio}%</div>
                    </div>
                    <div class="stat-card stat-neutral">
                        <div class="stat-number">${stats.neutral}</div>
                        <div class="stat-label">中性 ${stats.neutral_ratio}%</div>
                    </div>
                    <div class="stat-card stat-negative">
                        <div class="stat-number">${stats.negative}</div>
                        <div class="stat-label">负面 ${stats.negative_ratio}%</div>
                    </div>
                `;
                
                // 渲染情感分布图
                if (sentimentChart) {
                    sentimentChart.dispose();
                }
                sentimentChart = echarts.init(document.getElementById('sentiment-chart'));
                sentimentChart.setOption({
                    tooltip: { trigger: 'item' },
                    legend: { top: 'bottom' },
                    series: [{
                        name: '情感分布',
                        type: 'pie',
                        radius: '55%',
                        data: [
                            { name: '正面', value: stats.positive, itemStyle: { color: '#10b981' } },
                            { name: '中性', value: stats.neutral, itemStyle: { color: '#f59e0b' } },
                            { name: '负面', value: stats.negative, itemStyle: { color: '#ef4444' } }
                        ],
                        label: { show: true, formatter: '{b}: {d}%' }
                    }]
                });
            } catch (error) {
                statsContainer.innerHTML = `<div class="loading">加载失败: ${error.message}</div>`;
            }
        }

        // 切换标签页
        function switchTab(tab) {
            currentTab = tab;
            selectedIndex = -1;
            
            // 更新按钮样式
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if (btn.dataset.tab === tab) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            
            // 重置详情面板
            document.getElementById('detail-panel').innerHTML = `
                <div class="loading" style="padding: 2rem;">
                    <i class="fas fa-mouse-pointer"></i> 点击左侧热词查看详细分析
                </div>
            `;
            
            // 加载数据
            loadRanking();
            loadWordcloud();
            loadSentiment();
        }

        // HTML转义
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 绑定标签页切换
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    switchTab(btn.dataset.tab);
                });
            });
            
            // 加载数据
            switchTab('general');
        });
    </script>
</body>
</html>
